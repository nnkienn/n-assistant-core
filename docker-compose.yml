# ═══════════════════════════════════════════════════════════════════════════
# n-assistant-core — COMMUNITY compose (MIT, open-source)
# Standalone stack for anyone who clones the public repo and runs it locally.
# Contains NO SaaS infra (no Postgres, no auth, no billing).
#
#   docker compose up --build
# ═══════════════════════════════════════════════════════════════════════════

networks:
  core_net:
    driver: bridge

volumes:
  qdrant_data:
  redis_data:

services:
  # ── Redis — cache & Celery broker ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: core-redis
    ports:
      - "6399:6379"
    volumes:
      - redis_data:/data
    networks:
      - core_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant — vector database ───────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.8.4
    container_name: core-qdrant
    ports:
      - "6353:6333"   # REST
      - "6354:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - core_net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Core API — FastAPI application ─────────────────────────────────────
  core-api:
    image: n-assistant-core-api:local-dev
    build:
      context: .
      dockerfile: Dockerfile
    container_name: core-api
    ports:
      - "8100:8000"
    env_file:
      - .env
    environment:
      # Service-discovery overrides (container hostnames)
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - core_net

  # ── Harvester (Chặng 0) — autonomous data acquisition ─────────────────
  # Enable with: docker compose --profile harvester up
  harvester:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: core-harvester
    profiles: ["harvester"]
    command: ["python", "-m", "app.infrastructure.harvester.scheduler"]
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      QDRANT_URL: http://qdrant:6333
      SCRAPER_CONFIG: /app/scraper_config.yaml
    volumes:
      - ./scraper_config.yaml:/app/scraper_config.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - core_net
