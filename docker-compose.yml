# ═══════════════════════════════════════════════════════════════════════════
# n-assistant-core — COMMUNITY compose (MIT, open-source)
# Standalone stack for anyone who clones the public repo and runs it locally.
# Contains NO SaaS infra (no Postgres, no auth, no billing).
#
#   docker compose up --build
# ═══════════════════════════════════════════════════════════════════════════

networks:
  core_net:
    driver: bridge

volumes:
  qdrant_data:
  redis_data:

services:
  # ── Redis — cache & Celery broker ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: core-redis
    ports:
      - "6399:6379"
    volumes:
      - redis_data:/data
    networks:
      - core_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant — vector database ───────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.8.4
    container_name: core-qdrant
    ports:
      - "6353:6333"   # REST
      - "6354:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - core_net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Core API — FastAPI application ─────────────────────────────────────
  core-api:
    image: n-assistant-core-api:local-dev
    build:
      context: .
      dockerfile: Dockerfile
    container_name: core-api
    ports:
      - "8100:8000"
    env_file:
      - .env
    environment:
      # Service-discovery overrides (container hostnames)
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - core_net
    volumes:
      # The 3-layer filter reads raw data + thresholds in config/scraper_config.yaml.
      # Run via: docker compose run --rm --no-deps core-api python cli.py filter
      - ./config/scraper_config.yaml:/app/config/scraper_config.yaml:ro
      - ./raw_data_lake:/app/raw_data_lake
      # YouTube cookies (optional). Export from Chrome via "Get cookies.txt LOCALLY"
      # extension → save as config/yt_cookies.txt. Set YT_COOKIES_FILE=/app/config/yt_cookies.txt
      # in .env to activate. Without this the container IP may get 403 on transcripts.
      - ./config/yt_cookies.txt:/app/config/yt_cookies.txt

  # ── Harvester (Chặng 0) — autonomous data acquisition + CLI runner ────
  # This image ships cli.py, so it doubles as the unified CLI runner.
  # Use the wrapper scripts (./nassistant.sh / .\nassistant.ps1) or call it
  # directly — any cli.py subcommand overrides the default `harvest`:
  #   docker compose --profile harvester run --rm harvester python cli.py list-plugins
  #   docker compose --profile harvester run --rm harvester python cli.py harvest
  #   docker compose --profile harvester run --rm harvester python cli.py filter
  # (Celery Beat cron scheduling is a later Chặng 0 workstream item.)
  harvester:
    build:
      context: .
      dockerfile: Dockerfile.harvester   # ships Chromium for Playwright plugins
    container_name: core-harvester
    profiles: ["harvester"]
    command: ["python", "cli.py", "harvest"]
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      HARVESTER_CONFIG_PATH: /app/config/scraper_config.yaml
      RAW_DATA_LAKE_PATH: /app/raw_data_lake/texts
    # Lets the container reach an Ollama server on the host / an SSH tunnel
    # (INFERENCE_BASE_URL=http://host.docker.internal:11434/v1).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Live-editable source registry (no rebuild to change targets).
      - ./config/scraper_config.yaml:/app/config/scraper_config.yaml:ro
      # Persist harvested raw JSON onto the host for inspection.
      - ./raw_data_lake:/app/raw_data_lake
      # YouTube cookies — same file as core-api (see note above).
      - ./config/yt_cookies.txt:/app/config/yt_cookies.txt
    networks:
      - core_net
