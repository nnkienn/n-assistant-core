# ═══════════════════════════════════════════════════════════════════════════
# n-assistant-core — COMMUNITY compose (MIT, open-source)
# Standalone stack for anyone who clones the public repo and runs it locally.
# Contains NO SaaS infra (no Postgres, no auth, no billing).
#
#   docker compose up --build
# ═══════════════════════════════════════════════════════════════════════════

networks:
  core_net:
    driver: bridge

volumes:
  qdrant_data:
  redis_data:

services:
  # ── Redis — cache & Celery broker ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: core-redis
    ports:
      - "6399:6379"
    volumes:
      - redis_data:/data
    networks:
      - core_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant — vector database ───────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.8.4
    container_name: core-qdrant
    ports:
      - "6353:6333"   # REST
      - "6354:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - core_net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Core API — FastAPI application ─────────────────────────────────────
  core-api:
    image: n-assistant-core-api:local-dev
    build:
      context: .
      dockerfile: Dockerfile
    container_name: core-api
    ports:
      - "8100:8000"
    env_file:
      - .env
    environment:
      # Service-discovery overrides (container hostnames)
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - core_net

  # ── Harvester (Chặng 0) — autonomous data acquisition ─────────────────
  # One-shot manual test run:
  #   docker compose --profile harvester run --rm --build harvester
  # (Celery Beat cron scheduling is a later Chặng 0 workstream item.)
  harvester:
    build:
      context: .
      dockerfile: Dockerfile.harvester   # ships Chromium for Playwright plugins
    container_name: core-harvester
    profiles: ["harvester"]
    command: ["python", "run_harvester.py"]
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      HARVESTER_CONFIG_PATH: /app/scraper_config.yaml
      RAW_DATA_LAKE_PATH: /app/raw_data_lake/texts
    volumes:
      # Live-editable source registry (no rebuild to change targets).
      - ./scraper_config.yaml:/app/scraper_config.yaml:ro
      # Persist harvested raw JSON onto the host for inspection.
      - ./raw_data_lake:/app/raw_data_lake
    networks:
      - core_net
