# ═══════════════════════════════════════════════════════════════════════════
# Harvester source registry (Chặng 0) — ZERO-HARDCODE.
# Every scraping target is declared here, never in Python.
# The cloud layer's config UI writes/overwrites this file via core's
# /v1/harvester/* API. Reloading reconfigures the harvester without a redeploy.
#
# Schema (plugin architecture):
#   name      — unique human-readable id for the source.
#   type      — plugin discriminator; MUST match a plugin's PLUGIN_TYPE under
#               app/infrastructure/harvester/extractors/plugins/.
#   tenant_id — REQUIRED on every source. Missing → the source is DISCARDED
#               (tenant-isolation iron rule; stamped onto every raw artifact).
#   enabled   — toggle without deleting the entry.
#   options   — zero-hardcode bag passed verbatim to the plugin.
#
# Secrets: use ${VAR} placeholders — resolved from the environment (.env) at
# load time, so real tokens never live in this tracked file.
#
# Compliance (binding — see .agent/rules/tech-stack-rule.md §4 / §10):
#   - PUBLIC pages only. No login-walled private or other-tenant PII.
#   - Respect robots.txt / ToS; honor per-source rate limits.
#
# Focus: AI content ecosystem — X (twscrape) + YouTube Shorts (yt-dlp).
# ═══════════════════════════════════════════════════════════════════════════

sources:
  # ── X — AI trending (twscrape) ──────────────────────────────────────────
  # GraphQL API: structured JSON + native video URLs. Needs auth_token + ct0.
  # Get both from browser devtools → Application → Cookies → x.com.
  - name: x-ai-trending
    type: x_twscrape
    tenant_id: tenant_demo
    enabled: false  # ← tắt tạm để test YT Shorts
    options:
      query: "AI agent since:2026-06-02 lang:en min_faves:200"
      limit: 50
      auth_token: "${X_AUTH_TOKEN}"
      ct0: "${X_CT0_TOKEN}"
      product: "Top"

  - name: x-ai-tools
    type: x_twscrape
    tenant_id: tenant_demo
    enabled: false  # ← tắt tạm để test YT Shorts
    options:
      query: "(#AItools OR #LLM OR #GenerativeAI) -(discord OR telegram OR airdrop) since:2026-06-02 min_faves:200"
      limit: 50
      auth_token: "${X_AUTH_TOKEN}"
      ct0: "${X_CT0_TOKEN}"
      product: "Top"

  # ── X — Anti-spam high-signal AI/LLM source ─────────────────────────────
  # Uses advanced operators to block spam AT THE SOURCE before any Python code
  # runs: negative terms (crypto/nft/airdrop) + minimum engagement gate (200 faves).
  # The content_filter_pipeline then applies 3 more layers on top.
  - name: x-ai-antispam-hq
    type: x_twscrape
    tenant_id: tenant_demo
    enabled: false  # ← tắt tạm để test YT Shorts
    options:
      query: '("Claude" OR "Cursor" OR "AI Agent" OR "LLM") -(crypto OR nft OR airdrop) min_faves:200'
      limit: 100
      auth_token: "${X_AUTH_TOKEN}"
      ct0: "${X_CT0_TOKEN}"
      product: "Top"
      locale: en

  # ── YouTube Shorts — Channel mode (verified AI/tech creators) ──────────
  # Scrapes the /shorts tab of curated, high-quality channels.
  # Content is from verified creators with real engagement (millions of views).
  # This is the PRIMARY quality source. Search mode below is for discovery.
  - name: yt-fireship
    type: youtube_shorts
    tenant_id: tenant_demo
    enabled: true
    options:
      channel: "@Fireship"          # 3M+ subs, AI/web/tech Shorts
      limit: 10
      max_duration_s: 60
      download_video: false

  - name: yt-matt-wolfe
    type: youtube_shorts
    tenant_id: tenant_demo
    enabled: true
    options:
      channel: "@MattVidPro"        # Matt Wolfe — AI tools & news
      limit: 10
      max_duration_s: 60
      download_video: false

  - name: yt-worldofai
    type: youtube_shorts
    tenant_id: tenant_demo
    enabled: false                  # TODO: tìm handle đúng
    options:
      channel: "@WorldofAI"          # AI news & demos
      limit: 10
      max_duration_s: 60
      download_video: false

  - name: yt-networkchuck
    type: youtube_shorts
    tenant_id: tenant_demo
    enabled: true
    options:
      channel: "@NetworkChuck"      # Tech/AI tutorials
      limit: 10
      max_duration_s: 60
      download_video: false

  # ── YouTube Shorts — Search mode (discovery, broad net) ────────────────
  # Backup discovery source with min_views gate to avoid garbage.
  - name: yt-search-ai-news
    type: youtube_shorts
    tenant_id: tenant_demo
    enabled: true
    options:
      query: "AI news"
      limit: 10
      min_views: 500                # quality gate — chặn kênh 0-view
      max_duration_s: 60
      download_video: false

# ═══════════════════════════════════════════════════════════════════════════
# 3-Layer Anti-Spam Filter Config (read by content_filter_pipeline.py)
# These thresholds are intentionally strict: better to miss a borderline tweet
# than to let junk pollute the script-generation context.
# ═══════════════════════════════════════════════════════════════════════════
filter_config:
  heuristic:
    # Maximum number of hashtags allowed — spam typically stacks 5+.
    max_hashtags: 3
    # Minimum word count — weeds out one-liners and pure engagement-bait.
    min_words: 15
    # Maximum @mentions — mass-mention threads are almost always off-topic.
    max_mentions: 2

  # ── YouTube Shorts heuristic (read by yt_filter_pipeline.py) ──────────
  youtube_shorts_heuristic:
    # Minimum combined (title + description) word count.
    # Lowered from 30 → 10 because YT Shorts descriptions are naturally
    # shorter than tweets. The LLM judge at Layer 3 handles quality.
    min_transcript_words: 10

